<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Petek Kelime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#E7DFD0; --bg-deep:#DCD2BE; --tile:#FBF7EA; --tile-edge:#D8CDB6;
  --ink:#2E2A24; --ink-soft:#8A7E68; --honey:#E8A93C; --honey-deep:#B5761F;
  --teal:#3E7C6F; --danger:#C4553B; --card:#F3EDDD;
  --shadow:0 3px 0 var(--tile-edge), 0 8px 18px rgba(90,75,50,.14);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:'Fredoka',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);
  display:flex;justify-content:center;overflow:hidden;user-select:none;-webkit-user-select:none;}
#app{width:100%;max-width:440px;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;padding:14px;}
.hidden{display:none!important;}

/* ---------- MENÜ ---------- */
#menu{align-items:center;justify-content:flex-start;overflow-y:auto;padding-top:34px;}
.logo-comb{display:flex;gap:6px;margin-bottom:10px;}
.logo-hex{width:52px;height:58px;display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:700;color:var(--ink);background:var(--tile);
  clip-path:polygon(25% 0,75% 0,100% 50%,75% 100%,25% 100%);
  filter:drop-shadow(0 3px 0 var(--tile-edge));}
.logo-hex.h{background:var(--honey);color:#fff;}
h1{margin:2px 0 0;font-size:34px;font-weight:700;letter-spacing:.5px;}
.subtitle{color:var(--ink-soft);font-size:15px;margin:4px 0 22px;font-weight:500;}
.mode-row{display:flex;gap:10px;width:100%;margin-bottom:22px;}
.mode-btn{flex:1;padding:14px 6px 12px;border:none;border-radius:18px;background:var(--tile);
  box-shadow:var(--shadow);font-family:inherit;font-size:16px;font-weight:600;color:var(--ink);
  display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
.mode-btn .ic{font-size:24px;line-height:1;}
.mode-btn.active{background:var(--honey);color:#fff;box-shadow:0 3px 0 var(--honey-deep),0 8px 18px rgba(181,118,31,.3);}
.section-label{width:100%;font-size:13px;font-weight:600;color:var(--ink-soft);letter-spacing:1.5px;margin:0 0 10px 4px;}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;width:100%;padding-bottom:24px;}
.lv-btn{aspect-ratio:1;border:none;border-radius:16px;background:var(--tile);box-shadow:var(--shadow);
  font-family:inherit;font-size:18px;font-weight:700;color:var(--ink);cursor:pointer;
  display:flex;align-items:center;justify-content:center;}
.lv-btn.done{background:var(--teal);color:#fff;box-shadow:0 3px 0 #2C5A50,0 8px 18px rgba(62,124,111,.25);}
.lv-btn:active{transform:translateY(2px);}

/* ---------- OYUN ---------- */
#game{padding:10px 12px;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.icon-btn{width:40px;height:40px;border:none;border-radius:14px;background:var(--tile);box-shadow:var(--shadow);
  font-size:18px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.level-title{text-align:center;}
.level-title .b{font-size:16px;font-weight:700;}
.level-title .t{font-size:11px;color:var(--ink-soft);font-weight:600;letter-spacing:2px;}
.score-row{display:flex;align-items:center;justify-content:center;gap:14px;margin:4px 0 8px;}
.score-pill{background:var(--tile);box-shadow:var(--shadow);border-radius:14px;padding:6px 18px;font-size:18px;font-weight:700;min-width:110px;text-align:center;}
.score-pill small{display:block;font-size:9px;font-weight:600;color:var(--ink-soft);letter-spacing:1.5px;}
.timer{font-size:12px;color:var(--ink-soft);font-weight:600;min-width:44px;text-align:center;}

.targets{display:flex;flex-direction:column;gap:8px;align-items:center;margin-bottom:6px;min-height:46px;justify-content:center;}
.target-row{display:flex;gap:4px;}
.slot{border-radius:8px;background:var(--bg-deep);display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--ink);box-shadow:inset 0 2px 3px rgba(90,75,50,.18);transition:background .2s;}
.slot.revealed{background:var(--tile);box-shadow:var(--shadow);}
.slot.solved{background:var(--teal);color:#fff;box-shadow:0 3px 0 #2C5A50;}
@keyframes pop{0%{transform:scale(.4);}60%{transform:scale(1.18);}100%{transform:scale(1);}}
.slot.pop{animation:pop .35s ease;}

.hint-row{display:flex;align-items:center;justify-content:center;gap:10px;margin:2px 0 4px;}
.hint-track{width:150px;height:14px;border-radius:8px;background:var(--bg-deep);box-shadow:inset 0 2px 3px rgba(90,75,50,.18);overflow:hidden;}
.hint-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--honey),var(--honey-deep));border-radius:8px;transition:width .4s;}
.hint-btn{width:38px;height:38px;border-radius:50%;background:var(--tile);box-shadow:var(--shadow);
  font-size:18px;line-height:1;opacity:.5;position:relative;flex:0 0 38px;
  display:flex;align-items:center;justify-content:center;}
.hint-btn.ready{opacity:1;background:var(--honey);animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

.word-preview{height:38px;display:flex;align-items:center;justify-content:center;margin-bottom:2px;}
.wp-pill{padding:5px 20px;border-radius:12px;background:var(--tile);box-shadow:var(--shadow);
  font-size:20px;font-weight:700;letter-spacing:2px;min-width:60px;text-align:center;transition:background .15s,color .15s;}
.wp-pill.empty{opacity:0;}
.wp-pill.good{background:var(--teal);color:#fff;}
.wp-pill.dup{background:var(--ink-soft);color:#fff;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
.wp-pill.bad{animation:shake .3s;background:var(--danger);color:#fff;}

#board-wrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;}
svg{touch-action:none;max-width:100%;max-height:100%;}
.hex{fill:var(--tile);stroke:var(--tile-edge);stroke-width:1.5;transition:fill .12s;}
.hexg .lt{font-weight:600;fill:var(--ink);pointer-events:none;font-family:'Fredoka',sans-serif;}
.hexg.sel .hex{fill:var(--honey);}
.hexg.sel .lt{fill:#fff;}
.hexg.flash-good .hex{fill:var(--teal);}
.hexg.flash-good .lt{fill:#fff;}
.trail{stroke:var(--honey-deep);stroke-width:9;stroke-linecap:round;stroke-linejoin:round;fill:none;opacity:.55;pointer-events:none;}
.wheel-bg{fill:var(--tile);opacity:.75;}
.shuffle-ic{font-size:30px;fill:var(--ink-soft);font-family:'Fredoka',sans-serif;cursor:pointer;}
.fly{position:absolute;font-size:22px;font-weight:700;color:var(--honey-deep);pointer-events:none;z-index:50;transition:all .7s cubic-bezier(.3,1.2,.5,1);}
.float-pts{position:absolute;font-size:20px;font-weight:700;color:var(--teal);pointer-events:none;z-index:50;animation:rise 1s forwards;}
@keyframes rise{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-46px);}}

.bonus-strip{min-height:24px;max-height:24px;overflow:hidden;display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:4px;}
.bonus-chip{font-size:11px;font-weight:600;color:var(--ink-soft);background:var(--card);padding:2px 8px;border-radius:8px;}

/* ---------- OVERLAY ---------- */
.overlay{position:absolute;inset:0;background:rgba(46,42,36,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:24px;}
.panel{background:var(--card);border-radius:24px;padding:26px 22px;width:100%;max-width:320px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.panel h2{margin:0 0 4px;font-size:24px;}
.panel .theme-name{color:var(--ink-soft);font-weight:600;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px;}
.stat-grid{display:flex;justify-content:center;gap:12px;margin:14px 0 20px;}
.stat{background:var(--tile);border-radius:14px;padding:10px 14px;box-shadow:var(--shadow);min-width:78px;}
.stat .v{font-size:20px;font-weight:700;}
.stat .k{font-size:9px;font-weight:600;color:var(--ink-soft);letter-spacing:1px;}
.btn{border:none;border-radius:16px;padding:13px 24px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);}
.btn.primary{background:var(--honey);color:#fff;box-shadow:0 3px 0 var(--honey-deep);}
.btn.ghost{background:var(--tile);color:var(--ink);margin-top:10px;}
.btn:active{transform:translateY(2px);}
.panel .btn{width:100%;}
.ptable{width:100%;border-collapse:collapse;margin:8px 0 4px;}
.ptable th{font-size:13px;color:var(--honey-deep);font-weight:700;padding:4px;}
.ptable td{font-size:15px;font-weight:600;padding:3px;border-top:1px solid var(--bg-deep);}
</style>
</head>
<body>
<div id="app">

  <!-- MENÜ -->
  <div class="screen" id="menu">
    <div class="logo-comb">
      <div class="logo-hex">P</div><div class="logo-hex h">E</div><div class="logo-hex">T</div><div class="logo-hex h">E</div><div class="logo-hex">K</div>
    </div>
    <h1>Petek Kelime</h1>
    <div class="subtitle">Harfleri birleştir, gizli kelimeleri bul</div>
    <div class="mode-row">
      <button class="mode-btn" id="mb-petek" onclick="setMode('petek')"><span class="ic">⬡</span>Petek</button>
      <button class="mode-btn" id="mb-kare" onclick="setMode('kare')"><span class="ic">▦</span>Kare</button>
      <button class="mode-btn" id="mb-wheel" onclick="setMode('wheel')"><span class="ic">◎</span>Wheel</button>
    </div>
    <div class="section-label">BÖLÜMLER</div>
    <div class="level-grid" id="level-grid"></div>
  </div>

  <!-- OYUN -->
  <div class="screen hidden" id="game">
    <div class="top-bar">
      <button class="icon-btn" onclick="goMenu()">←</button>
      <div class="level-title"><div class="b" id="g-level"></div><div class="t" id="g-mode"></div></div>
      <button class="icon-btn" onclick="showTable()">ⓘ</button>
    </div>
    <div class="score-row">
      <div class="timer" id="g-timer">0:00</div>
      <div class="score-pill"><small>PUAN</small><span id="g-score">0</span></div>
      <div class="timer" style="opacity:0">0:00</div>
    </div>
    <div class="targets" id="g-targets"></div>
    <div class="hint-row">
      <div class="hint-track"><div class="hint-fill" id="hint-fill"></div></div>
      <div class="hint-btn" id="hint-btn">💡</div>
    </div>
    <div class="word-preview"><div class="wp-pill empty" id="wp"></div></div>
    <div id="board-wrap"></div>
    <div class="bonus-strip" id="bonus-strip"></div>
  </div>

  <div class="overlay hidden" id="win-overlay">
    <div class="panel">
      <h2>Bölüm Tamamlandı! 🎉</h2>
      <div class="theme-name" id="w-theme"></div>
      <div class="stat-grid">
        <div class="stat"><div class="v" id="w-score">0</div><div class="k">PUAN</div></div>
        <div class="stat"><div class="v" id="w-time">0:00</div><div class="k">SÜRE</div></div>
        <div class="stat"><div class="v" id="w-bonus">0</div><div class="k">KELİME</div></div>
      </div>
      <button class="btn primary" id="w-next" onclick="nextLevel()">Sonraki Bölüm →</button>
      <button class="btn ghost" onclick="goMenu()">Bölümler</button>
    </div>
  </div>

  <div class="overlay hidden" id="table-overlay" onclick="this.classList.add('hidden')">
    <div class="panel">
      <h2>Puan Tablosu</h2>
      <table class="ptable">
        <tr><th>Uzunluk</th><th>Puan</th></tr>
        <tr><td>3</td><td>1</td></tr><tr><td>4</td><td>3</td></tr><tr><td>5</td><td>7</td></tr>
        <tr><td>6</td><td>13</td></tr><tr><td>7</td><td>21</td></tr><tr><td>8</td><td>31</td></tr>
        <tr><td>9</td><td>43</td></tr><tr><td>10</td><td>57</td></tr>
      </table>
      <div style="font-size:12px;color:var(--ink-soft);margin-top:8px;">Bonus kelimeler ipucu çubuğunu doldurur.<br>Çubuk dolunca bir harf otomatik açılır.</div>
    </div>
  </div>

</div>

let progress = {petek:{done:{},best:{}}, kare:{done:{},best:{}}, wheel:{done:{},best:{}}};
function mergeProgress(p){
  if(!p) return;
  if(p.done){ progress.petek = p; return; }  // eski tek-mod formatı
  for(const m of ['petek','kare','wheel']) if(p[m]) progress[m]=p[m];
}
async function loadProgress(){
  try{
    if(window.storage){
      const r = await window.storage.get('petek-progress');
      if(r && r.value) mergeProgress(JSON.parse(r.value));
    } else {
      const r = localStorage.getItem('petek-progress');
      if(r) mergeProgress(JSON.parse(r));
    }
  }catch(e){}
  renderMenu();
}
async function saveProgress(){
  try{
    const s = JSON.stringify(progress);
    if(window.storage) await window.storage.set('petek-progress', s);
    else localStorage.setItem('petek-progress', s);
  }catch(e){}
}

// ---------- ses ----------
let AC=null;
function beep(f,d=0.07,type='sine',g=0.12){
  try{
    AC = AC || new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), gn=AC.createGain();
    o.type=type;o.frequency.value=f;gn.gain.value=g;
    o.connect(gn);gn.connect(AC.destination);
    o.start();gn.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.stop(AC.currentTime+d);
  }catch(e){}
}

let L=null, li=0, score=0, hintPts=0, found=new Set(), solved=new Set(), revealed={}, t0=0, tInt=null;

function startLevel(i){

// ---------- hedef slotları ----------
function renderTargets(){
  const c=document.getElementById('g-targets');c.innerHTML='';
  L.targets.forEach(t=>{
    const row=document.createElement('div');row.className='target-row';row.dataset.word=t;
    const isSolved=solved.has(t);
    const w = t.length>8 ? 28 : 32;
    for(let i=0;i<t.length;i++){
      const s=document.createElement('div');s.className='slot';
      s.style.width=w+'px'; s.style.height=(w+4)+'px'; s.style.fontSize=(w*0.58)+'px';
      if(isSolved){s.classList.add('solved');s.textContent=t[i];}
      else if(revealed[t][i]){s.classList.add('revealed');s.textContent=t[i];}
      row.appendChild(s);
    }
    c.appendChild(row);
  });
}

// ---------- tahtalar ----------
function svgEl(tag){return document.createElementNS('http://www.w3.org/2000/svg',tag);}
function makeTile(g, shape, cx, cy, letter, fontSize){
  const tx=svgEl('text');
  tx.setAttribute('x',cx);tx.setAttribute('y',cy+2);
  tx.setAttribute('text-anchor','middle');tx.setAttribute('dominant-baseline','middle');
  tx.setAttribute('class','lt');tx.setAttribute('font-size',fontSize);tx.textContent=letter;
  g.appendChild(shape);g.appendChild(tx);
}

function renderBoard(){
  const wrap=document.getElementById('board-wrap');wrap.innerHTML='';
  centers={};
  const svg=svgEl('svg');svg.id='board';
  const trail=svgEl('polyline');trail.setAttribute('class','trail');trail.id='trail';

  if(mode==='petek'){
    tileR=44; hitR=tileR*0.7;
    const R=tileR, hw=R, hh=Math.sqrt(3)/2*R;
    let maxX=0,maxY=0;
    L.tiles.forEach(t=>{
      const x=hw+t.c*1.5*R, y=hh+t.r*2*hh+(t.c%2?hh:0);
      centers[t.c+','+t.r]={x,y,l:t.l,c:t.c,r:t.r};
      maxX=Math.max(maxX,x+hw);maxY=Math.max(maxY,y+hh);
    });
    svg.setAttribute('viewBox',`-8 -8 ${maxX+16} ${maxY+16}`);
    svg.appendChild(trail);
    Object.entries(centers).forEach(([key,ct])=>{
      const g=svgEl('g');g.setAttribute('class','hexg');g.dataset.key=key;
      const pts=[];
      for(let a=0;a<6;a++){const ang=Math.PI/3*a;pts.push((ct.x+R*0.96*Math.cos(ang)).toFixed(1)+','+(ct.y+R*0.96*Math.sin(ang)).toFixed(1));}
      const p=svgEl('polygon');p.setAttribute('points',pts.join(' '));p.setAttribute('class','hex');
      makeTile(g,p,ct.x,ct.y,ct.l,34);
      svg.appendChild(g);
    });
    adjOK=(a,b)=>{
      const A=centers[a],B=centers[b];
      const res=[[A.c,A.r-1],[A.c,A.r+1]];
      if(A.c%2===0){res.push([A.c-1,A.r-1],[A.c-1,A.r],[A.c+1,A.r-1],[A.c+1,A.r]);}
      else{res.push([A.c-1,A.r],[A.c-1,A.r+1],[A.c+1,A.r],[A.c+1,A.r+1]);}
      return res.some(([c,r])=>c===B.c&&r===B.r);
    };
  }
  else if(mode==='kare'){
    const S=84, G=10;  // taş boyutu ve boşluk
    tileR=S/2; hitR=S*0.44;
    L.tiles.forEach(t=>{
      const x=S/2+t.c*(S+G), y=S/2+t.r*(S+G);
      centers[t.c+','+t.r]={x,y,l:t.l,c:t.c,r:t.r};
    });
    const W=4*S+3*G;
    svg.setAttribute('viewBox',`-8 -8 ${W+16} ${W+16}`);
    svg.appendChild(trail);
    Object.entries(centers).forEach(([key,ct])=>{
      const g=svgEl('g');g.setAttribute('class','hexg');g.dataset.key=key;
      const rc=svgEl('rect');
      rc.setAttribute('x',ct.x-S/2);rc.setAttribute('y',ct.y-S/2);
      rc.setAttribute('width',S);rc.setAttribute('height',S);
      rc.setAttribute('rx',16);rc.setAttribute('class','hex');
      makeTile(g,rc,ct.x,ct.y,ct.l,40);
      svg.appendChild(g);
    });
    adjOK=(a,b)=>{
      const A=centers[a],B=centers[b];
      return Math.abs(A.c-B.c)<=1 && Math.abs(A.r-B.r)<=1;
    };
  }
  else{ // wheel
    const n=L.letters.length;
    const RING=132, LR=n>7?30:34;
    tileR=LR; hitR=LR*0.95;
    const C=RING+LR+12;
    svg.setAttribute('viewBox',`0 0 ${2*C} ${2*C}`);
    const bg=svgEl('circle');
    bg.setAttribute('cx',C);bg.setAttribute('cy',C);bg.setAttribute('r',RING+LR+8);
    bg.setAttribute('class','wheel-bg');
    svg.appendChild(bg);
    svg.appendChild(trail);
    L.letters.forEach((l,i)=>{
      const ang=-Math.PI/2 + i*2*Math.PI/n;
      const x=C+RING*Math.cos(ang), y=C+RING*Math.sin(ang);
      centers['w'+i]={x,y,l};
    });
    Object.entries(centers).forEach(([key,ct])=>{
      const g=svgEl('g');g.setAttribute('class','hexg');g.dataset.key=key;
      const ci=svgEl('circle');
      ci.setAttribute('cx',ct.x);ci.setAttribute('cy',ct.y);ci.setAttribute('r',LR);
      ci.setAttribute('class','hex');ci.setAttribute('stroke-width',0);
      ci.style.fill='transparent';
      // wheel'de taşlar görünmez daire; sadece harf + seçim halkası
      makeTile(g,ci,ct.x,ct.y,ct.l, n>7?40:46);
      svg.appendChild(g);
    });
    // ortadaki karıştırma ikonu
    const sh=svgEl('text');
    sh.setAttribute('x',C);sh.setAttribute('y',C+2);
    sh.setAttribute('text-anchor','middle');sh.setAttribute('dominant-baseline','middle');
    sh.setAttribute('class','shuffle-ic');sh.textContent='⇄';sh.id='shuffle';
    svg.appendChild(sh);
    adjOK=()=>true;  // serbest sıra
  }
  wrap.appendChild(svg);
  attachPointer(svg);
}

function shuffleWheel(){
  if(path.length)return;
  const keys=Object.keys(centers);
  const letters=keys.map(k=>centers[k].l);
  for(let i=letters.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [letters[i],letters[j]]=[letters[j],letters[i]];
  }
  keys.forEach((k,i)=>{
    centers[k].l=letters[i];
    const g=document.querySelector(`.hexg[data-key="${k}"] .lt`);
    if(g)g.textContent=letters[i];
  });
  beep(500,0.06);beep(620,0.06);
}

// ---------- sürükleme ----------
let path=[], dragging=false;
function attachPointer(svg){
  const toSvg=(e)=>{
    const pt=svg.createSVGPoint();pt.x=e.clientX;pt.y=e.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse());
  };
  const hitTile=(e)=>{
    const p=toSvg(e);
    let best=null,bd=1e9;
    for(const k in centers){
      const c=centers[k];
      const d=(c.x-p.x)**2+(c.y-p.y)**2;
      if(d<bd){bd=d;best=k;}
    }
    return bd < hitR*hitR ? best : null;
  };
  svg.addEventListener('pointerdown',e=>{
    e.preventDefault();
    try{svg.setPointerCapture(e.pointerId);}catch(_){}
    if(mode==='wheel'){
      const p=toSvg(e);
      const vb=svg.viewBox.baseVal;
      const cx=vb.width/2, cy=vb.height/2;
      if((p.x-cx)**2+(p.y-cy)**2 < 42*42){shuffleWheel();return;}
    }
    const k=hitTile(e);if(!k)return;
    dragging=true;path=[k];updateSel();beep(440+path.length*30,0.05);
  });
  svg.addEventListener('pointermove',e=>{
    if(!dragging)return;e.preventDefault();
    const k=hitTile(e);if(!k)return;
    const last=path[path.length-1];
    if(k===last)return;
    if(path.length>1 && k===path[path.length-2]){path.pop();updateSel();return;}
    if(!path.includes(k) && adjOK(last,k)){
      path.push(k);updateSel();beep(440+path.length*30,0.05);
    }
  });
  const up=()=>{if(dragging){dragging=false;submit();}};
  svg.addEventListener('pointerup',up);
  svg.addEventListener('pointercancel',up);
}
function curWord(){return path.map(k=>centers[k].l).join('');}
function updateSel(){
  document.querySelectorAll('.hexg').forEach(g=>g.classList.toggle('sel',path.includes(g.dataset.key)));
  const trail=document.getElementById('trail');
  trail.setAttribute('points',path.map(k=>centers[k].x+','+centers[k].y).join(' '));
  const wp=document.getElementById('wp');
  const w=curWord();
  wp.className='wp-pill'+(w?'':' empty');
  wp.textContent=w;
  if(w.length>=3){
    if(L.targets.includes(w)&&!solved.has(w)) wp.classList.add('good');
    else if(found.has(w)) wp.classList.add('dup');
    else if(L.bonus.includes(w)) wp.classList.add('good');
  }
}

// wheel'de seçili harfin dolgusu görünsün
const styleFix=document.createElement('style');
styleFix.textContent='.hexg.sel circle.hex{fill:var(--honey)!important;} .hexg.flash-good circle.hex{fill:var(--teal)!important;}';
document.head.appendChild(styleFix);

// ---------- kelime gönderimi ----------
function submit(){
  const w=curWord();
  const wp=document.getElementById('wp');
  const clear=()=>{path=[];updateSel();};
  if(w.length<3){clear();return;}

  if(L.targets.includes(w) && !solved.has(w)){
    solveTarget(w);clear();return;
  }
  if(found.has(w) || solved.has(w)){
    wp.className='wp-pill dup';wp.textContent='Zaten bulundu';
    setTimeout(clear,500);return;
  }
  if(L.bonus.includes(w)){
    found.add(w);
    const pts=POINTS[w.length]||0;
    score+=pts;hintPts+=pts;
    document.getElementById('g-score').textContent=score;
    flashPath('flash-good');
    floatPts('+'+pts);
    addChip(w);
    updateHintUI();
    checkAutoHint();
    beep(700,0.1,'triangle');setTimeout(()=>beep(900,0.12,'triangle'),90);
    clear();return;
  }
  wp.classList.add('bad');beep(180,0.15,'square',0.06);
  setTimeout(clear,350);
}

function flashPath(cls){
  const keys=[...path];
  document.querySelectorAll('.hexg').forEach(g=>{
    if(keys.includes(g.dataset.key)){g.classList.add(cls);setTimeout(()=>g.classList.remove(cls),450);}
  });
}
function floatPts(txt){
  const el=document.createElement('div');el.className='float-pts';el.textContent=txt;
  const wrap=document.getElementById('board-wrap').getBoundingClientRect();
  const app=document.getElementById('app').getBoundingClientRect();
  el.style.left=(wrap.left-app.left+wrap.width/2-14)+'px';
  el.style.top=(wrap.top-app.top+16)+'px';
  document.getElementById('app').appendChild(el);
  setTimeout(()=>el.remove(),1000);
}
function addChip(w){
  const s=document.getElementById('bonus-strip');
  const c=document.createElement('span');c.className='bonus-chip';c.textContent=w;
  s.prepend(c);
}

// ---------- hedef çözümü ----------
function solveTarget(w){
  solved.add(w);
  score+=POINTS[w.length]||0;
  document.getElementById('g-score').textContent=score;
  flashPath('flash-good');
  beep(600,0.1,'triangle');setTimeout(()=>beep(800,0.1,'triangle'),100);setTimeout(()=>beep(1050,0.2,'triangle'),200);
  const app=document.getElementById('app').getBoundingClientRect();
  const row=[...document.querySelectorAll('.target-row')].find(r=>r.dataset.word===w);
  const svg=document.getElementById('board');
  path.forEach((k,i)=>{
    const c=centers[k];
    const pt=svg.createSVGPoint();pt.x=c.x;pt.y=c.y;
    const sp=pt.matrixTransform(svg.getScreenCTM());
    const fly=document.createElement('div');fly.className='fly';fly.textContent=c.l;
    fly.style.left=(sp.x-app.left-8)+'px';fly.style.top=(sp.y-app.top-12)+'px';
    document.getElementById('app').appendChild(fly);
    const slot=row.children[i].getBoundingClientRect();
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{
      fly.style.left=(slot.left-app.left+slot.width/2-8)+'px';
      fly.style.top=(slot.top-app.top+slot.height/2-14)+'px';
    });});
    setTimeout(()=>{fly.remove();
      row.children[i].classList.add('solved','pop');row.children[i].textContent=w[i];
    },700+i*30);
  });
  setTimeout(()=>{
    if(L.targets.every(t=>solved.has(t))) win();
  },900+w.length*30);
}

// ---------- ipucu ----------
function updateHintUI(){
  const pct=Math.min(100,hintPts/HINT_FULL*100);
  document.getElementById('hint-fill').style.width=pct+'%';
}
function checkAutoHint(){
  if(hintPts<HINT_FULL)return;
  setTimeout(()=>{
    if(hintPts>=HINT_FULL){
      useHint();
      checkAutoHint();
    }
  },500);
}
function useHint(){
  if(hintPts<HINT_FULL)return;
  const open=L.targets.filter(t=>!solved.has(t)).sort((a,b)=>b.length-a.length);
  if(!open.length)return;
  const t=open[0];
  // Turkce harf sikligi: yaygin -> nadir. Ipucu en nadir (en zor) harfi acar.
  const FREQ='AEİNRLIKDMUYTSBOÜŞZGÇHĞVCÖPFJW';
  const rarity=ch=>{const i=FREQ.indexOf(ch);return i<0?FREQ.length:i;};
  let cands=[];
  for(let i=1;i<t.length;i++) if(!revealed[t][i]) cands.push(i);
  let idx;
  if(cands.length){
    const maxR=Math.max(...cands.map(i=>rarity(t[i])));
    const top=cands.filter(i=>rarity(t[i])===maxR);
    idx=top[Math.floor(Math.random()*top.length)];
  } else idx = revealed[t][0] ? -1 : 0;
  if(idx<0)return;
  revealed[t][idx]=true;
  hintPts-=HINT_FULL;
  updateHintUI();renderTargets();
  const hb=document.getElementById('hint-btn');
  hb.classList.add('ready');setTimeout(()=>hb.classList.remove('ready'),900);
  beep(880,0.15,'sine');
  if(revealed[t].every(v=>v)){
    solved.add(t);renderTargets();
    if(L.targets.every(x=>solved.has(x))) setTimeout(win,400);
  }
}

// ---------- kazanma ----------
function win(){
  stopTimer();
  const ms=Date.now()-t0;
  progress[mode].done[li]=true;
  progress[mode].best[li]=Math.max(progress[mode].best[li]||0,score);
  saveProgress();
  document.getElementById('w-theme').textContent=MODES[mode].name+' · Bölüm '+(li+1);
  document.getElementById('w-score').textContent=score;
  document.getElementById('w-time').textContent=fmtT(ms);
  document.getElementById('w-bonus').textContent=found.size;
  document.getElementById('w-next').style.display= li+1<MODES[mode].levels.length?'block':'none';
  document.getElementById('win-overlay').classList.remove('hidden');
  beep(523,0.12,'triangle');setTimeout(()=>beep(659,0.12,'triangle'),120);setTimeout(()=>beep(784,0.25,'triangle'),240);
}
function nextLevel(){ if(li+1<MODES[mode].levels.length) startLevel(li+1); }

loadProgress();
</script>
